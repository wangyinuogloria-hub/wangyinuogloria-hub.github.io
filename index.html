<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>妈妈，生日快乐</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FFF5F7;
    --pink: #F8B4C8;
    --deep-pink: #E8879B;
    --text: #6B4A5C;
    --white: #FFFFFF;
    --shadow: rgba(232, 135, 155, 0.15);
  }

  body {
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden;
    background: var(--bg);
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  /* CSS Petals */
  #petalContainer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1000; overflow: hidden;
  }
  .petal {
    position: absolute; top: -30px;
    width: 16px; height: 8px;
    background: radial-gradient(ellipse at 35% 50%, #FAD1DC, #F8B4C8);
    border-radius: 50% 10% 50% 10%;
    opacity: 0.35;
    animation: petalFall linear infinite;
  }
  @keyframes petalFall {
    0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.4; }
    80% { opacity: 0.35; }
    100% { transform: translateY(105vh) translateX(var(--drift)) rotate(360deg); opacity: 0; }
  }
  .petal-burst {
    position: absolute;
    width: 14px; height: 7px;
    background: radial-gradient(ellipse at 35% 50%, #FAD1DC, #F8B4C8);
    border-radius: 50% 10% 50% 10%;
    pointer-events: none; z-index: 1001;
    animation: petalBurst 1.2s ease-out forwards;
  }
  @keyframes petalBurst {
    0% { transform: translate(0, 0) rotate(0deg) scale(1); opacity: 0.7; }
    100% { transform: translate(var(--bx), var(--by)) rotate(var(--br)) scale(0); opacity: 0; }
  }

  /* Page Container */
  .page {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.8s ease, transform 0.8s ease;
    transform: translateY(20px);
    z-index: 1;
  }
  .page.active {
    opacity: 1; pointer-events: auto; transform: translateY(0);
  }
  .page.exit-up {
    opacity: 0; transform: translateY(-30px);
  }

  /* Start Overlay */
  #startOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,245,247,0.92);
    z-index: 999; cursor: pointer;
    flex-direction: column;
  }
  #startOverlay .start-text {
    font-size: 1.2rem; color: var(--deep-pink);
    animation: breathe 2s ease-in-out infinite;
    letter-spacing: 0.15em;
  }
  #startOverlay .start-icon { font-size: 2.5rem; margin-bottom: 1rem; }
  @keyframes breathe {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.06); }
  }

  /* Page 1 — Photo Showcase */
  #page1 { justify-content: flex-start; padding-top: 6vh; }

  .photo-stage {
    position: relative; width: 100%; height: 65vh; height: 65dvh;
    display: flex; align-items: center; justify-content: center;
  }
  .photo-main {
    position: absolute;
    max-width: 88vw; max-height: 72vh; max-height: 72dvh;
    object-fit: contain;
    border-radius: 10px;
    box-shadow: 0 12px 40px var(--shadow), 0 2px 8px rgba(0,0,0,0.06);
    background: var(--white);
    padding: 8px 8px 32px 8px;
    opacity: 0; transform: scale(0.3);
    transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  .photo-main.show {
    opacity: 1; transform: scale(1);
    pointer-events: auto;
  }
  .photo-main.retreat {
    transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1.2);
  }

  /* Photo Wall */
  .photo-wall {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }
  .photo-wall-img {
    position: absolute;
    border-radius: 3px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    background: var(--white);
    padding: 3px 3px 14px 3px;
    object-fit: cover;
    transition: opacity 0.5s ease;
    opacity: 0;
  }
  .photo-wall-img.placed { opacity: 1; }

  .photo-hint {
    margin-top: 2vh;
    font-size: 0.9rem; color: var(--deep-pink);
    opacity: 0; transition: opacity 0.6s ease;
    animation: breathe 2s ease-in-out infinite;
  }
  .photo-hint.visible { opacity: 0.7; }

  /* Page 2 — Blessing */
  .blessing-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, rgba(255,245,247,0.75) 0%, rgba(255,245,247,0.92) 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; z-index: 5;
    transition: opacity 1s ease;
  }
  .blessing-overlay.show { opacity: 1; pointer-events: auto; }

  .blessing-title {
    font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    color: var(--deep-pink);
    letter-spacing: 0.2em;
    text-shadow: 0 2px 12px rgba(232,135,155,0.3);
    filter: blur(8px); opacity: 0;
    transition: filter 1.2s ease, opacity 1.2s ease;
    animation: float 3s ease-in-out infinite;
  }
  .blessing-title.reveal { filter: blur(0); opacity: 1; }

  .blessing-sub {
    margin-top: 1.2rem;
    font-size: clamp(1rem, 3vw, 1.4rem);
    color: var(--text);
    letter-spacing: 0.12em;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.8s ease 0.6s, transform 0.8s ease 0.6s;
  }
  .blessing-sub.reveal { opacity: 0.85; transform: translateY(0); }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Page 3 — Letter */
  #page3 { justify-content: flex-start; padding: 4vh 1rem; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .letter-card {
    background: var(--white);
    border-radius: 12px;
    box-shadow: 0 8px 32px var(--shadow);
    padding: 1.8rem 1.4rem;
    max-width: 500px; width: 100%;
    margin: 0 auto;
    position: relative;
  }
  .letter-line {
    font-size: clamp(0.95rem, 2.6vw, 1.08rem);
    line-height: 2;
    color: #9E9E9E;
    transition: color 0.4s ease, font-weight 0.3s ease;
    letter-spacing: 0.04em;
  }
  .letter-line.highlight {
    color: var(--deep-pink);
    font-weight: 600;
  }
  .letter-line.played {
    color: var(--text);
  }
  .letter-line.blank { height: 0.6rem; }

  .letter-player {
    display: flex; align-items: center; justify-content: center;
    gap: 0.8rem; margin-top: 1.4rem; padding-top: 1rem;
    border-top: 1px solid rgba(248,180,200,0.3);
  }
  .play-btn {
    width: 48px; height: 48px; border-radius: 50%;
    border: none; background: var(--pink);
    color: var(--white); font-size: 1.4rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(248,180,200,0.4);
    transition: transform 0.2s ease, background 0.2s ease;
    flex-shrink: 0;
  }
  .play-btn:active { transform: scale(0.92); }
  .play-btn.playing { background: var(--deep-pink); }

  .letter-hint {
    font-size: 0.8rem; color: var(--deep-pink); opacity: 0.7;
  }

  /* Page 4 — Closing */
  .closing-text {
    font-family: "Songti SC", "STSong", "Noto Serif CJK SC", serif;
    font-size: clamp(1.4rem, 4.5vw, 2rem);
    color: var(--deep-pink);
    text-align: center; line-height: 2;
    letter-spacing: 0.1em;
    opacity: 0; transform: translateY(20px);
    transition: opacity 1s ease, transform 1s ease;
  }
  .closing-text.reveal { opacity: 1; transform: translateY(0); }

  .closing-sign {
    margin-top: 2rem;
    font-size: 1rem; color: var(--text);
    opacity: 0; transition: opacity 0.8s ease 1.2s;
    text-align: center;
  }
  .closing-sign.reveal { opacity: 0.8; }

  .replay-btn {
    margin-top: 2.5rem; padding: 0.7rem 2rem;
    border-radius: 24px; border: 1.5px solid var(--pink);
    background: transparent; color: var(--deep-pink);
    font-size: 0.95rem; cursor: pointer;
    letter-spacing: 0.08em;
    opacity: 0; transition: opacity 0.6s ease 1.8s, background 0.2s ease;
  }
  .replay-btn.reveal { opacity: 1; }
  .replay-btn:active { background: rgba(248,180,200,0.15); }

  /* Swipe hint */
  .swipe-indicator {
    position: fixed; bottom: 3vh; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    z-index: 10; pointer-events: none;
    opacity: 0; transition: opacity 0.5s ease;
  }
  .swipe-indicator.visible { opacity: 0.6; }
  .swipe-dot {
    width: 5px; height: 5px; border-radius: 50%; background: var(--deep-pink);
    animation: swipePulse 1.6s ease-in-out infinite;
  }
  .swipe-dot:nth-child(2) { animation-delay: 0.15s; }
  .swipe-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes swipePulse {
    0%, 100% { opacity: 0.3; transform: translateY(0); }
    50% { opacity: 1; transform: translateY(6px); }
  }

  @media (min-width: 768px) {
    .photo-main { max-width: 55vw; max-height: 60vh; }
    .photo-stage { height: 60vh; }
  }
</style>
</head>
<body>

<div id="petalContainer"></div>

<!-- Start Overlay -->
<div id="startOverlay" onclick="startExperience()">
  <div class="start-icon">💝</div>
  <div class="start-text">轻 触 屏 幕 开 始</div>
</div>

<!-- Page 1: Photo Memories -->
<div class="page active" id="page1">
  <div class="photo-stage" id="photoStage">
    <div class="photo-wall" id="photoWall"></div>
    <img class="photo-main" id="photoMain" src="" alt="">
  </div>
  <div class="photo-hint" id="photoHint">向上滑动 或 点击进入祝福</div>
</div>

<!-- Page 2: Blessing -->
<div class="blessing-overlay" id="blessingOverlay">
  <div class="blessing-title" id="blessingTitle">妈妈，生日快乐</div>
  <div class="blessing-sub" id="blessingSub">49岁，比花还美</div>
  <div class="swipe-indicator visible" style="bottom:4vh;">
    <div class="swipe-dot"></div><div class="swipe-dot"></div><div class="swipe-dot"></div>
  </div>
</div>

<!-- Page 3: Letter -->
<div class="page" id="page3">
  <div class="letter-card" id="letterCard"></div>
  <div class="letter-player" id="letterPlayer">
    <button class="play-btn" id="playBtn" onclick="toggleRecording()">▶</button>
    <span class="letter-hint" id="letterHint">点击播放妈妈的录音</span>
  </div>
  <div class="swipe-indicator visible" style="position:relative;bottom:auto;margin-top:1.2rem;">
    <div class="swipe-dot"></div><div class="swipe-dot"></div><div class="swipe-dot"></div>
  </div>
</div>

<!-- Page 4: Closing -->
<div class="page" id="page4">
  <div class="closing-text" id="closingText">
    愿岁月温柔以待<br>
    愿我最亲爱的妈妈<br>
    健康永驻<br>
    天天幸福
  </div>
  <div class="closing-sign" id="closingSign">永远爱你的 宝贝一诺</div>
  <button class="replay-btn" id="replayBtn" onclick="replayAll()">再看一次</button>
</div>

<!-- Audio -->
<audio id="globalBgm" preload="auto" loop src="bgm.m4a"></audio>
<audio id="recordingAudio" preload="auto" src="recording.m4a"></audio>

<script>
// ========== PHOTOS ==========
const PHOTOS = [
  'photos/photo-1.jpg','photos/photo-2.jpg','photos/photo-3.jpg',
  'photos/photo-4.jpg','photos/photo-5.jpg','photos/photo-6.jpg',
  'photos/photo-7.jpg','photos/photo-8.jpg','photos/photo-9.jpg',
  'photos/photo-10.jpg','photos/photo-11.jpg','photos/photo-12.jpg',
  'photos/photo-13.jpg','photos/photo-14.jpg','photos/photo-15.jpg'
];

// ========== LETTER SEGMENTS ==========
const LETTER_SEGMENTS = [
  '亲爱的妈妈：',
  '今天是你49岁的生日，也是六一儿童节。',
  '小时候每到这一天，爸爸总是给我们俩一起过，你的生日，我的儿童节。',
  '后来我长大了，不再是过儿童节的小孩了。但我想，以后所有的爱意，我和爸爸都要让你一个人独享，让你被幸福完完整整地包围。',
  '四十九年，你把青春织成了这个家的温暖，把岁月酿成了我生命里的光。',
  '可是你总是不够自信。总说自己这里不好，那里不够好，如果怎样怎样可能会更好。',
  '你说自己不擅长唱歌，但这几年你的进步我和爸爸都看在眼里。你说自己荒废了舞蹈，可你排出来的节目比谁都好看。',
  '你总说你很遗憾忘掉了钢琴，可是每次我回家，看到你坐在琴前的即兴伴奏，我都会眼前一亮。',
  '我很高兴陶笛和埙给了你更多的自信，让你有机会去探索属于自己的音乐世界。希望你一直坚持下去，你吹奏的样子真的很美。',
  '每次我打开抖音刷到你的视频，看到你灿烂的笑脸，看到你过得那么幸福，尽管我们相隔一千七百公里，我也会觉得心暖暖的。',
  '你还总是担心很多。担心自己的教育方式过于严苛，担心专业技能不足做不成一些事。但妈妈你知道吗，你想做成的事，最后真的都会做成。',
  '你担心和这个世界脱轨，担心我们之间没有共同话题，担心你不知道那些新潮的事情会被我嫌弃。',
  '妈妈，这全是多虑。在我心里你永远是最棒的妈妈。因为从来不是这个世界在推着你走，是你教会了我整个世界。',
  '所以从今天起，遇到新鲜事物就大胆去尝试吧。49岁正是人生的大好年华，想做什么都不要再犹豫了。不会的，我和爸爸还有豆包，永远都在你身边。',
  '我一直都知道你是一个做事利落、心思缜密又敏感的人。你不用佯装太多，特别是在家里。你本来的模样，就是我心里妈妈最好的模样。',
  '妈妈，前半生你为我遮风挡雨，后半生，你也会是最幸福的小孩。',
  '生日快乐，我最爱的妈妈。'
];

// ========== GLOBAL STATE ==========
let currentPage = 1;
let photoIndex = 0;
let photoTimer = null;
let isTransitioning = false;
let globalBgmStarted = false;
let recordingPlaying = false;

// ========== DOM REFS ==========
const petalContainer = document.getElementById('petalContainer');
const startOverlay = document.getElementById('startOverlay');
const page1 = document.getElementById('page1');
const page3 = document.getElementById('page3');
const page4 = document.getElementById('page4');
const photoStage = document.getElementById('photoStage');
const photoWall = document.getElementById('photoWall');
const photoMain = document.getElementById('photoMain');
const photoHint = document.getElementById('photoHint');
const blessingOverlay = document.getElementById('blessingOverlay');
const blessingTitle = document.getElementById('blessingTitle');
const blessingSub = document.getElementById('blessingSub');
const letterCard = document.getElementById('letterCard');
const letterPlayer = document.getElementById('letterPlayer');
const playBtn = document.getElementById('playBtn');
const letterHint = document.getElementById('letterHint');
const closingText = document.getElementById('closingText');
const closingSign = document.getElementById('closingSign');
const replayBtn = document.getElementById('replayBtn');
const globalBgm = document.getElementById('globalBgm');
const recording = document.getElementById('recordingAudio');

// ========== CSS PETALS ==========
function setupPetals() {
  for (let i = 0; i < 18; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal';
    petal.style.left = Math.random() * 100 + '%';
    petal.style.setProperty('--drift', (Math.random() - 0.5) * 120 + 'px');
    petal.style.animationDuration = (3.5 + Math.random() * 4) + 's';
    petal.style.animationDelay = Math.random() * 5 + 's';
    petal.style.width = (10 + Math.random() * 12) + 'px';
    petal.style.height = (5 + Math.random() * 6) + 'px';
    petalContainer.appendChild(petal);
  }
}
setupPetals();

function burstPetals(x, y) {
  for (let i = 0; i < 6; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal-burst';
    petal.style.left = x + 'px';
    petal.style.top = y + 'px';
    petal.style.setProperty('--bx', (Math.random() - 0.5) * 80 + 'px');
    petal.style.setProperty('--by', -30 - Math.random() * 50 + 'px');
    petal.style.setProperty('--br', (Math.random() - 0.5) * 360 + 'deg');
    petalContainer.appendChild(petal);
    setTimeout(() => petal.remove(), 1300);
  }
}

document.addEventListener('click', function(e) {
  burstPetals(e.clientX, e.clientY);
});
document.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    burstPetals(e.touches[0].clientX, e.touches[0].clientY);
  }
}, {passive: true});

// ========== IMAGE PRELOADING ==========
let imagesPreloaded = false;
function preloadImages() {
  return Promise.all(PHOTOS.map(src => {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = img.onerror = resolve;
      img.src = src;
    });
  }));
}

// ========== START EXPERIENCE ==========
let preloading = false;
async function startExperience() {
  if (globalBgmStarted || preloading) return;
  preloading = true;
  startOverlay.querySelector('.start-text').textContent = '正 在 准 备 照 片 ...';
  startOverlay.querySelector('.start-icon').textContent = '🌸';

  // Preload all images before starting
  await preloadImages();
  imagesPreloaded = true;

  globalBgmStarted = true;
  startOverlay.style.display = 'none';
  preloading = false;

  if (!audioAnalysisDone) analyzeAudioPauses();
  globalBgm.play().catch(() => {});
  startPhotoSequence();
}

// ========== PHOTO WALL GRID ==========
const COLS = 5;
const ROWS = 3;
const WALL_PHOTOS = [];

function buildPhotoWall() {
  photoWall.innerHTML = '';
  WALL_PHOTOS.length = 0;

  const wallW = photoStage.clientWidth;
  const wallH = photoStage.clientHeight;
  const paddingX = wallW * 0.04;
  const paddingY = wallH * 0.08;
  const gapX = wallW * 0.03;
  const gapY = wallH * 0.05;
  const usableW = wallW - paddingX * 2 - gapX * (COLS - 1);
  const usableH = wallH - paddingY * 2 - gapY * (ROWS - 1);
  const cellW = usableW / COLS;
  const cellH = usableH / ROWS;

  for (let i = 0; i < PHOTOS.length; i++) {
    const row = Math.floor(i / COLS);
    const col = i % COLS;
    const left = paddingX + col * (cellW + gapX);
    const top = paddingY + row * (cellH + gapY);
    const rot = (Math.random() - 0.5) * 6;

    const img = document.createElement('img');
    img.className = 'photo-wall-img';
    img.src = PHOTOS[i];
    img.style.left = left + 'px';
    img.style.top = top + 'px';
    img.style.width = (cellW - 8) + 'px';
    img.style.height = (cellH - 8) + 'px';
    img.style.transform = 'rotate(' + rot + 'deg)';
    photoWall.appendChild(img);

    WALL_PHOTOS.push({
      el: img,
      left: left - 8,
      top: top - 8,
      width: cellW - 8,
      height: cellH - 8,
      rot: rot
    });
  }
}

// ========== PHOTO SEQUENCE ==========
function startPhotoSequence() {
  buildPhotoWall();
  photoIndex = 0;
  showNextPhoto();
}

function showNextPhoto() {
  if (photoIndex >= PHOTOS.length) {
    finishPhotoSequence();
    return;
  }

  const img = photoMain;
  img.src = PHOTOS[photoIndex];
  img.classList.remove('retreat');

  // Compute natural transform to center
  img.style.left = '50%';
  img.style.top = '50%';
  img.style.transform = 'translate(-50%, -50%) scale(0.3)';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      img.classList.add('show');
      img.style.transform = 'translate(-50%, -50%) scale(1)';
    });
  });

  photoTimer = setTimeout(() => {
    retreatPhoto();
  }, 1600);
}

function retreatPhoto() {
  if (photoIndex >= WALL_PHOTOS.length) {
    photoIndex++;
    showNextPhoto();
    return;
  }

  const target = WALL_PHOTOS[photoIndex];
  const img = photoMain;
  img.classList.add('retreat');
  img.classList.remove('show');

  img.style.left = (target.left + target.width / 2) + 'px';
  img.style.top = (target.top + target.height / 2) + 'px';
  img.style.transform = 'translate(-50%, -50%) scale(0.22) rotate(' + target.rot + 'deg)';
  img.style.maxWidth = 'none';
  img.style.width = target.width + 'px';
  img.style.height = target.height + 'px';
  img.style.padding = '3px 3px 14px 3px';
  img.style.borderRadius = '3px';
  img.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
  img.style.zIndex = '0';

  // Show wall version
  setTimeout(() => {
    target.el.classList.add('placed');
    img.style.opacity = '0';
  }, 400);

  setTimeout(() => {
    // Reset main photo for next
    img.classList.remove('retreat');
    img.style.opacity = '1';
    img.style.left = '50%';
    img.style.top = '50%';
    img.style.transform = 'translate(-50%, -50%) scale(0.3)';
    img.style.maxWidth = '85vw';
    img.style.maxHeight = '55vh';
    img.style.width = '';
    img.style.height = '';
    img.style.padding = '8px 8px 32px 8px';
    img.style.borderRadius = '10px';
    img.style.boxShadow = '0 12px 40px rgba(232,135,155,0.15), 0 2px 8px rgba(0,0,0,0.06)';
    img.style.zIndex = '';
    img.classList.remove('show');

    photoIndex++;
    setTimeout(() => showNextPhoto(), 300);
  }, 800);
}

function finishPhotoSequence() {
  // All photos converge to center with a spin
  const wallW = photoWall.clientWidth;
  const wallH = photoWall.clientHeight;
  const centerX = wallW / 2;
  const centerY = wallH / 2;

  WALL_PHOTOS.forEach((wp, i) => {
    const cx = wp.left + wp.width / 2;
    const cy = wp.top + wp.height / 2;
    const dx = centerX - cx;
    const dy = centerY - cy;

    wp.el.style.transition = 'transform 1.3s cubic-bezier(0.35, 0.8, 0.25, 1), opacity 1.1s ease 0.3s';
    wp.el.style.transitionDelay = (i * 0.03) + 's';
    wp.el.style.transform = 'rotate(' + (wp.rot + 360) + 'deg) translate(' + dx + 'px, ' + dy + 'px) scale(0.15)';
    wp.el.style.opacity = '0.5';
  });

  // Fade out main photo if visible
  photoMain.style.transition = 'opacity 0.6s ease';
  photoMain.style.opacity = '0';

  setTimeout(() => {
    transitionToPage(2);
  }, 1500);
}

// ========== SKIP PHOTO ON TAP ==========
let retreatingBusy = false;
photoMain.addEventListener('click', function(e) {
  e.stopPropagation();
  if (isTransitioning || retreatingBusy) return;
  clearTimeout(photoTimer);
  retreatingBusy = true;
  retreatPhoto();
  setTimeout(() => { retreatingBusy = false; }, 900);
});

// ========== PAGE TRANSITIONS ==========
function transitionToPage(targetPage) {
  if (isTransitioning) return;
  isTransitioning = true;

  if (targetPage === 2) {
    // Show blessing overlay
    blessingOverlay.classList.add('show');
    photoHint.classList.remove('visible');

    setTimeout(() => {
      blessingTitle.classList.add('reveal');
      blessingSub.classList.add('reveal');
    }, 400);

    // Add tap to advance
    setTimeout(() => {
      blessingOverlay.onclick = function() {
        transitionToPage(3);
      };
    }, 1500);

    isTransitioning = false;

  } else if (targetPage === 3) {
    blessingOverlay.classList.remove('show');
    blessingTitle.classList.remove('reveal');
    blessingSub.classList.remove('reveal');
    blessingOverlay.onclick = null;

    page1.classList.remove('active');
    page3.classList.add('active');
    currentPage = 3;

    buildLetter();

    // Auto-play recording after transition settles
    setTimeout(() => {
      if (!letterTimestamps.length) {
        const dur = (recording.duration && isFinite(recording.duration)) ? recording.duration : 161;
        const totalChars = LETTER_SEGMENTS.reduce((sum, s) => sum + s.length, 0);
        let acc = 0.9;
        letterTimestamps = [{ index: 0, time: acc }];
        for (let i = 0; i < LETTER_SEGMENTS.length; i++) {
          acc += (LETTER_SEGMENTS[i].length / totalChars) * (dur - 1.5);
          letterTimestamps.push({ index: i + 1, time: Math.min(acc, dur - 0.3) });
        }
      }
      globalBgm.pause();
      recording.currentTime = 0;
      recording.play().then(() => {
        recordingPlaying = true;
        updatePlayBtn();
        resetLetterHighlights();
      }).catch(() => {});
    }, 600);

    setTimeout(() => { isTransitioning = false; }, 800);

  } else if (targetPage === 4) {
    page3.classList.remove('active');
    page4.classList.add('active');
    currentPage = 4;

    // Stop recording if playing
    if (recordingPlaying) {
      recording.pause();
      recordingPlaying = false;
      updatePlayBtn();
    }

    setTimeout(() => {
      closingText.classList.add('reveal');
      closingSign.classList.add('reveal');
      replayBtn.classList.add('reveal');
    }, 300);

    setTimeout(() => { isTransitioning = false; }, 800);
  }
}

// ========== LETTER & RECORDING ==========
function buildLetter() {
  letterCard.innerHTML = '';
  LETTER_SEGMENTS.forEach((seg, i) => {
    const el = document.createElement('div');
    el.className = 'letter-line';
    el.id = 'seg-' + i;
    el.textContent = seg;
    letterCard.appendChild(el);

    // Add blank line after certain segments for paragraph breaks
    if ([0, 3, 4, 11, 12].includes(i)) {
      const blank = document.createElement('div');
      blank.className = 'letter-line blank';
      blank.innerHTML = '&nbsp;';
      letterCard.appendChild(blank);
    }
  });
  letterPlayer.style.display = 'flex';
}

function toggleRecording() {
  if (recordingPlaying) {
    recording.pause();
    recordingPlaying = false;
    updatePlayBtn();
  } else {
    // Ensure timestamps are ready
    if (!letterTimestamps.length) {
      const dur = (recording.duration && isFinite(recording.duration)) ? recording.duration : 161;
      const totalChars = LETTER_SEGMENTS.reduce((sum, s) => sum + s.length, 0);
      let acc = 0.9;
      letterTimestamps = [{ index: 0, time: acc }];
      for (let i = 0; i < LETTER_SEGMENTS.length; i++) {
        acc += (LETTER_SEGMENTS[i].length / totalChars) * (dur - 1.5);
        letterTimestamps.push({ index: i + 1, time: Math.min(acc, dur - 0.3) });
      }
    }
    globalBgm.pause();
    recording.currentTime = 0;
    recording.play().catch(() => {});
    recordingPlaying = true;
    updatePlayBtn();
    resetLetterHighlights();
  }
}

function updatePlayBtn() {
  if (recordingPlaying) {
    playBtn.textContent = '⏸';
    playBtn.classList.add('playing');
    letterHint.textContent = '播放中...';
  } else {
    playBtn.textContent = '▶';
    playBtn.classList.remove('playing');
    letterHint.textContent = '点击播放妈妈的录音';
  }
}

function resetLetterHighlights() {
  LETTER_SEGMENTS.forEach((_, i) => {
    const el = document.getElementById('seg-' + i);
    if (el) { el.classList.remove('highlight', 'played'); }
  });
}

// ========== AUDIO ANALYSIS FOR SYNC ==========
let letterTimestamps = [];
let audioAnalysisDone = false;

async function analyzeAudioPauses() {
  try {
    const response = await fetch(recording.src);
    if (!response.ok) throw new Error('fetch failed');
    const arrayBuffer = await response.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

    const data = audioBuffer.getChannelData(0);
    const sampleRate = audioBuffer.sampleRate;
    const windowSamples = Math.floor(sampleRate * 0.04);

    // Compute RMS energy for each 40ms window
    const energies = [];
    for (let i = 0; i < data.length; i += windowSamples) {
      let sum = 0;
      const end = Math.min(i + windowSamples, data.length);
      for (let j = i; j < end; j++) sum += data[j] * data[j];
      energies.push({ time: i / sampleRate, rms: Math.sqrt(sum / (end - i)) });
    }

    // Find energy threshold
    const sorted = energies.map(e => e.rms).sort((a, b) => a - b);
    const p10 = sorted[Math.floor(sorted.length * 0.1)];
    const threshold = p10 * 1.8;

    // Detect silence intervals
    const silences = [];
    let start = -1;
    for (let i = 0; i < energies.length; i++) {
      if (energies[i].rms < threshold) {
        if (start < 0) start = energies[i].time;
      } else {
        if (start >= 0 && energies[i].time - start >= 0.25) {
          silences.push({ start, end: energies[i].time, mid: (start + energies[i].time) / 2 });
        }
        start = -1;
      }
    }

    // Pick the N-1 longest silences as segment boundaries
    const needed = LETTER_SEGMENTS.length - 1;
    silences.sort((a, b) => (b.end - b.start) - (a.end - a.start));
    const boundaries = silences.slice(0, needed)
      .sort((a, b) => a.mid - b.mid)
      .map(s => s.mid);

    // Build timestamps with global offset to prevent text-ahead-of-audio
    const GLOBAL_OFFSET = 0.55;
    letterTimestamps = [{ index: 0, time: Math.max(0.85, boundaries[0] - 0.1 + GLOBAL_OFFSET) }];
    for (let i = 1; i < LETTER_SEGMENTS.length; i++) {
      const extraDelay = GLOBAL_OFFSET * Math.max(0, 1 - i / 5);
      letterTimestamps.push({ index: i, time: boundaries[i - 1] + extraDelay });
    }

    audioCtx.close();
    audioAnalysisDone = true;
  } catch (e) {
    // Fallback: proportional estimation with offset
    const dur = (recording.duration && isFinite(recording.duration)) ? recording.duration : 161;
    const totalChars = LETTER_SEGMENTS.reduce((sum, s) => sum + s.length, 0);
    letterTimestamps = [];
    let acc = 0.9;
    letterTimestamps.push({ index: 0, time: acc });
    for (let i = 0; i < LETTER_SEGMENTS.length; i++) {
      acc += (LETTER_SEGMENTS[i].length / totalChars) * (dur - 1.5);
      letterTimestamps.push({ index: i + 1, time: Math.min(acc, dur - 0.3) });
    }
  }
}

recording.addEventListener('timeupdate', function() {
  if (!letterTimestamps.length) return;
  const t = recording.currentTime;

  let activeIndex = 0;
  for (let i = letterTimestamps.length - 1; i >= 0; i--) {
    if (t >= letterTimestamps[i].time) {
      activeIndex = letterTimestamps[i].index;
      break;
    }
  }

  LETTER_SEGMENTS.forEach((_, i) => {
    const el = document.getElementById('seg-' + i);
    if (!el) return;
    el.classList.remove('highlight');
    if (i < activeIndex) el.classList.add('played');
    else if (i === activeIndex) el.classList.add('highlight');
  });
});

recording.addEventListener('ended', function() {
  recordingPlaying = false;
  updatePlayBtn();
  // Mark all as played
  LETTER_SEGMENTS.forEach((_, i) => {
    const el = document.getElementById('seg-' + i);
    if (el) { el.classList.remove('highlight'); el.classList.add('played'); }
  });
  // Auto-advance to page 4 after a delay
  setTimeout(() => {
    if (currentPage === 3) transitionToPage(4);
  }, 2500);
});

// ========== SWIPE / TAP TO ADVANCE ==========
let touchStartY = 0, touchStartTime = 0;
document.addEventListener('touchstart', function(e) {
  touchStartY = e.touches[0].clientY;
  touchStartTime = Date.now();
}, {passive: true});

document.addEventListener('touchend', function(e) {
  if (isTransitioning) return;
  const dy = touchStartY - e.changedTouches[0].clientY;
  const isQuickTap = (dy >= -5 && dy <= 5) && (Date.now() - touchStartTime < 300);

  if (dy > 40 || isQuickTap) {
    if (blessingOverlay.classList.contains('show') && !page3.classList.contains('active')) {
      transitionToPage(3);
    } else if (currentPage === 3 && !recordingPlaying && isQuickTap) {
      transitionToPage(4);
    }
  }
});

// Desktop: click page3 background to advance
page3.addEventListener('click', function(e) {
  if (isTransitioning || recordingPlaying) return;
  if (e.target === page3 || e.target.closest('.swipe-indicator')) {
    transitionToPage(4);
  }
});

// Keyboard nav for testing
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (currentPage === 1 && blessingOverlay.classList.contains('show')) {
      transitionToPage(3);
    } else if (currentPage === 3) {
      transitionToPage(4);
    }
  }
});

// ========== REPLAY ==========
function replayAll() {
  page4.classList.remove('active');
  closingText.classList.remove('reveal');
  closingSign.classList.remove('reveal');
  replayBtn.classList.remove('reveal');

  // Reset photo wall
  photoWall.innerHTML = '';
  WALL_PHOTOS.length = 0;
  photoMain.classList.remove('show', 'retreat');
  photoMain.style.cssText = '';
  photoHint.classList.remove('visible');

  // Reset blessing
  blessingOverlay.classList.remove('show');
  blessingTitle.classList.remove('reveal');
  blessingSub.classList.remove('reveal');
  blessingOverlay.onclick = null;

  // Reset letter
  letterCard.innerHTML = '';
  letterPlayer.style.display = 'none';
  letterTimestamps = [];
  if (recordingPlaying) {
    recording.pause();
    recordingPlaying = false;
    updatePlayBtn();
  }

  // Reset pages
  page3.classList.remove('active');
  page1.classList.add('active');
  currentPage = 1;

  // Restart BGM
  globalBgm.currentTime = 0;
  globalBgm.play().catch(() => {});

  // Restart photo sequence
  setTimeout(() => startPhotoSequence(), 500);
}

// ========== INIT ==========
// Build photo wall on load, wait for start overlay tap
setTimeout(buildPhotoWall, 100);
window.addEventListener('resize', () => {
  if (currentPage === 1 && !blessingOverlay.classList.contains('show')) {
    buildPhotoWall();
  }
});

// Prevent double-tap zoom
document.addEventListener('dblclick', function(e) { e.preventDefault(); }, {passive: false});
</script>
